version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - STORAGE_BACKEND=local
      - LOCAL_STORAGE_PATH=/tmp/reports
      - CORS_ORIGINS=http://localhost:3000
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./tmp/reports:/tmp/reports
    depends_on:
      - mock_agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  mock_agent:
    build:
      context: ./mock_agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  reports_data:
